services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moderation
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: ./worker
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BURST_THRESHOLD=3
      
  api:
    build:
      context: ./api
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/moderation
      - WORKER_URL=http://worker:8000

volumes:
  postgres_data:
  redis_data: